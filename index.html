<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <!--Hanken Grotesk Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main>
      <div class="tophalf">
        <p class="yourresult">Your Result</p>
        <div class="circle">
          <h1 class="topnum">76</h1>
          <h2 class="bottomnum">of 100</h2>
        </div>

        <h3 class="great">Great</h3>
        <p class="desc">You scored higher than 65% of the people who have taken these tests.</p>
      </div>
      <section class="bottomhalf">
        <h4 class="summary">Summary</h4>

        <div class="results">
          <div class="reactiongroup">
            <img src="./assets/images/icon-reaction.svg" alt="" />
            <p class="reaction">Reaction</p>
            <p class="reactionnums"><strong>80</strong> / 100</p>
          </div>

          <div class="memorygroup">
            <img src="./assets/images/icon-memory.svg" alt="" />
            <p class="memory">Memory</p>
            <p class="memorynums"><strong>92</strong> / 100</p>
          </div>

          <div class="verbalgroup">
            <img src="./assets/images/icon-verbal.svg" alt="" />
            <p class="verbal">Verbal</p>
            <p class="verbalnums"><strong>61</strong> / 100</p>
          </div>

          <div class="visualgroup">
            <img src="./assets/images/icon-visual.svg" alt="" />
            <p class="visual">Visual</p>
            <p class="visualnums"><strong>72</strong> / 100</p>
          </div>
        </div>

        <button class="contbtn">Continue</button>
      </section>
    </main>

    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by
      <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
